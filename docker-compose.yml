services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-pdf_excel_ai}
      POSTGRES_USER: ${DB_USERNAME:-pdf_excel_ai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pdf_excel_ai}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pdf_excel_ai} -d ${DB_NAME:-pdf_excel_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build:
      context: .
    env_file:
      - .env
    environment:
      AI_API_URL: ${AI_API_URL:-https://api.openai.com/v1/chat/completions}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4.1-mini}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:4200}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../pdf-excel-ai-frontend
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data: